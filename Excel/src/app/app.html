<nz-layout class="app-layout">
  <nz-header nz-row nzJustify="space-between">
    <div nz-col class="logo">
      <a>
        <img src="images/logo.png" alt="logo" /> 
      </a>
    </div>
    <ul nz-menu nz-col class="top-nav" nzTheme="dark" nzMode="horizontal">
      @if (user()) {
      <button nz-button nzType="link" nzMatchRouter [routerLink]="['/', 'main']">
        <span>Tabla</span>
      </button>
      <button nz-button nzType="link" nzMatchRouter [routerLink]="['/', 'home']">
        <nz-icon nzType="home" nzTheme="outline" routerLink="/home" />
      </button>
      <button nz-button nzType="link" (click)="logout()">
        Cerrar Sesion
      </button>
      }@else {
      <!--Iniciar Sesion-->
      <app-modal-login />
      <!--Registarse-->
      <app-modal-register />
      }
    </ul>
  </nz-header>
  <nz-content>
    <div class="inner-content">
      <router-outlet></router-outlet>
    </div>
  </nz-content>
</nz-layout>
