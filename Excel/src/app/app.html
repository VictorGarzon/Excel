<nz-layout class="app-layout">
  <nz-header nz-row nzJustify="space-between">
    <div nz-col class="logo">
      <a>
        <img
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/e/e3/Microsoft_Office_Excel_%282019%E2%80%932025%29.svg/1280px-Microsoft_Office_Excel_%282019%E2%80%932025%29.svg.png"
          alt="logo" />
        <h1>Excel</h1>
      </a>
    </div>
    <ul nz-menu nz-col class="top-nav" nzTheme="dark" nzMode="horizontal">
      @if (user()) {
      <button nz-button nzType="link">
        <nz-icon nzType="home" nzTheme="outline" />
      </button>
      <button nz-button nzType="link" (click)="auth.logout()">
        Cerrar Sesion
      </button>
      }@else {
      <!--Iniciar Sesion-->
      <app-modal-login />
      <!--Registarse-->
      <app-modal-register />
      }
    </ul>
  </nz-header>
  <nz-content>
    <div class="inner-content">
      <router-outlet></router-outlet>
    </div>
  </nz-content>
</nz-layout>
