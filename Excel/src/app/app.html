<nz-layout class="app-layout">
  <nz-header nz-row nzJustify="space-between" nzAlign="middle">
    <div nz-col class="logo">
      <img src="images/logo.png" alt="logo" />
    </div>
    <div nz-col nz-row nzAlign="middle">
      <app-header-menu nzXs="0" nzSm="0" nzMd="24" nz-col></app-header-menu>
      <button nz-button nzType="link" nz-col nzMd="0" (click)="openDrawer()">
        <span nz-icon nzType="menu-fold" nzTheme="outline"></span>
      </button>
    </div>
  </nz-header>
  <nz-content>
    <div class="inner-content">
      <router-outlet></router-outlet>
    </div>
  </nz-content>
</nz-layout>
