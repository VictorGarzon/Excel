<div nz-flex [nzVertical]="isVertical" nzAlign="center">
    @if (!auth.isAdmin) {
    <button nz-button nzType="link" nzMatchRouter [routerLink]="['/main/hoja']">
        <span>Nueva Hoja de calculo</span>
    </button>
    <button nz-button nzType="link" nzMatchRouter [routerLink]="['/main/texto']">
        <span>Nueva Texto</span>
    </button>
    }
    @if (user()) {
    <button nz-button nzType="link" nzMatchRouter [routerLink]="['/', 'home']">
        <span nz-icon nzType="home" nzTheme="outline"></span>
    </button>
    <button nz-button nzType="link" nzMatchRouter [routerLink]="['/', 'profile']">
        <span nz-icon nzType="user" nzTheme="outline"></span>
    </button>
    <button nz-button nzType="link" (click)="logout()">
        Cerrar Sesion
    </button>
    }@else {
    <!--Iniciar Sesion-->
    <app-modal-login />
    <!--Registarse-->
    <app-modal-register />
    }
</div>
