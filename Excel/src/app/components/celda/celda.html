<input type="text" [value]="valor() ?? ''" (input)="cambiar($event)"
    [readOnly]="(funcion() && parte() !== 'head' ) || disabled() ?true:false" nz-popover
    [nzPopoverTitle]="parte()=='head' && funcion()?funcion():''"
    [nzPopoverContent]="parte()=='head' && funcion()?valoresCeldas():''">
@if ((parte()=="head"||parte()=="footer") && funcion()) {
<p>{{funcion()}}</p>
}
