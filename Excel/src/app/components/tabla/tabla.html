<header>
    <button (click)="exportar()">Exportar</button>
    <button (click)="impo()">Importar</button>
    <button (click)="aplicarFuncion('sumar')">Sumar</button>
    <button (click)="aplicarFuncion('restar')">restar</button>
    <button (click)="aplicarFuncionColumna('sumar')">sumar columna</button>
    <button (click)="confirmarColumnas()">Confirmar</button>
    <button (click)="eliminarFuncion()">quitar</button>
    <button (click)="aplicarFuncionColumna('')">quitar columna</button>
</header>
<main>
    <table>
        <thead>
            <tr app-fila [fila]="carga()?functions():headers()" [disabled]="modoSeleccion()"
                (selecionado)="onSelect($event)" [parte]="'head'" [tamColumna]="tamColumna()" (ampliar)="ampliarColum()"
                [car]="carga()">
            </tr>
        </thead>
        <tbody>
            <!--
            @for (fila of rows(); track fila.fila;let primero= $first) {
            @let inicio = ((primero && fila.fila == 0) || !primero )?fila.fila:0;
            @let fin = rows()[$index+1]?.fila ?? (tamFila() + 1);
            @for (n of [].constructor(fin - inicio); track $index) {
            <tr app-fila
                [fila]="(($first && inicio == fila.fila) || (primero && fila.fila == $index ))? fila.columnas:functions()"
                [disabled]="modoSeleccion()" (selecionado)="onSelect($event)" [tamColumna]="tamColumna()">
            </tr>
            }
            }
        -->
            @for (n of arrayFila(); track $index) {
            @let fila = buscarFila($index);
            <tr app-fila [fila]="carga()?functions():(fila?.columnas ?? functions())" [disabled]="modoSeleccion()"
                (selecionado)="onSelect($event)" [tamColumna]="tamColumna()"
                (click)="!modoSeleccion() && $index > (tamFila()! + 1) && ampliarFila()" (ampliar)="ampliarColum()"
                [car]="carga()">
            </tr>
            }
        </tbody>
        <tfoot>
            <tr app-fila [fila]="footerColumnas()" [parte]="'footer'" [tamColumna]="tamColumna()"
                (ampliar)="ampliarColum()" [car]="carga()">
            </tr>
        </tfoot>
    </table>
</main>
