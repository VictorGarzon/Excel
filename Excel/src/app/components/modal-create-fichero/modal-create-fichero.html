<button nz-button [nzType]="buttonType" (click)="showModal()">
    <span>{{ tipo() == 0? 'Crear Fichero':'Editar'}}</span>
</button>
<nz-modal [(nzVisible)]="visible" [nzTitle]="tipo() == 0? 'Crear Fichero':'Editar'" (nzOnCancel)="handleCancel()">
    <form *nzModalContent nz-form nzLayout="vertical" [formGroup]="tipo() == 0?createForm:editForm"
        (ngSubmit)="submitForm()">
        <nz-form-item>
            <nz-form-label nzRequired>Nombre</nz-form-label>
            <nz-form-control nzHasFeedback nzErrorTip="El nombre es necesario">
                <input nz-input formControlName="nombre" type="text" />
            </nz-form-control>
        </nz-form-item>
        <nz-form-item>
            <nz-form-label>Comment</nz-form-label>
            <nz-form-control nzErrorTip="Please write something here!">
                <nz-textarea-count [nzMaxCharacterCount]="50">
                    <textarea formControlName="descripcion" nz-input rows="2"></textarea>
                </nz-textarea-count>
            </nz-form-control>
        </nz-form-item>
        @if (tipo()== 0) {
        <nz-form-item>
            <nz-form-label nzRequired>Tipo Fichero</nz-form-label>
            <nz-form-control [nzValidateStatus]="validating()?'validating':''" nzHasFeedback>
                <nz-select formControlName="tipo">
                    @for (tipo of tipos(); track tipo.id) {
                    <nz-option [nzValue]="tipo.id" [nzLabel]="tipo.nombre" />
                    }
                </nz-select>
            </nz-form-control>
        </nz-form-item>
        }
    </form>
    <div *nzModalFooter>
        <button nz-button nzType="default" (click)="handleCancel()">Cancelar</button>
        <button nz-button nzType="primary" (click)="submitForm()" [nzLoading]="loading()"
            [disabled]="!((tipo() == 0?createForm:editForm).valid)">
            Crear</button>
    </div>
</nz-modal>
