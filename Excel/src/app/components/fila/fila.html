@for (n of arrayColumn(); track $index) {
@let celda = buscarCelda($index);
<td app-celda [valorCelda]="celda?.valor" [funcion]="celda?.funcion" [columnas]="celda?.columnas"
    [buscarCeldas]="buscarColumnas" [disabled]="modoSelect() || disabled()" (click)="modoSelect() && onSelect($index)" [parte]="parte()"
    (click)="!modoSelect() && $index >= (tamColumna()! + 1) && ampliar.emit()" [cargado]="cargado()">
</td>
}
